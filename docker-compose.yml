services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data

  agent:
    build: .
    command: ["python", "livekit_agent/agent.py", "start"]
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data
    depends_on:
      - backend
