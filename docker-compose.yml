services:
  backend:
    build: .
    command:
      - python
      - run.py
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data
  agent:
    build: .
    command:
      - python
      - app/agents/livekit/agent.py
      - start
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data
